run:
  name: hand_landmarks_baseline

data:
  source:
    path: data/operator_sequences
    stream: lane_01
    sample_count: 24

preprocessing:
  resize: [224, 224]
  normalize: true

roi:
  hand_roi: true
  chest_roi: true

features:
  temporal_window: 8
  include_geometry: true

model:
  name: mediapipe_hand_landmarks
  params:
    min_detection_confidence: 0.5
    min_tracking_confidence: 0.5

training:
  epochs: 1
  batch_size: 8
